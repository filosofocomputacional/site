<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulação de Empréstimo CLT</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #f0f4f8; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .container { 
            background: white; padding: 30px 20px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,40,100,0.1); 
            width: 100%; max-width: 450px; border-top: 6px solid #003366;
            min-height: 350px; display: flex; flex-direction: column; justify-content: center;
        }

        /* Estilo dos Passos */
        .step { display: none; animation: fadeIn 0.4s; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: #003366; text-align: center; font-size: 20px; margin-top: 0; }
        p.desc { color: #546e7a; text-align: center; font-size: 15px; line-height: 1.5; }

        .security-info {
            background: #e8f0fe; padding: 15px; border-radius: 8px;
            font-size: 13px; color: #3c4043; border-left: 4px solid #1a73e8; margin: 20px 0;
        }

        label { display: block; margin-top: 20px; color: #003366; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        input { 
            width: 100%; padding: 16px; margin-top: 8px; border: 1px solid #cfd8dc; 
            border-radius: 8px; font-size: 18px; color: #333; transition: all 0.3s;
        }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1); }

        .tempo-container { display: flex; gap: 12px; }
        
        /* Botões */
        .btn-group { margin-top: 30px; display: flex; gap: 10px; }
        button { 
            flex: 2; padding: 16px; background-color: #003366; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
            text-transform: uppercase;
        }
        button.btn-back { flex: 1; background-color: #cfd8dc; color: #546e7a; }
        button:disabled { background-color: #ccc; }

        /* Barra de Progresso */
        .progress-bar { 
            height: 6px; background: #e0e0e0; margin-bottom: 20px; border-radius: 3px; overflow: hidden;
        }
        .progress-fill { 
            height: 100%; background: #1a73e8; width: 0%; transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <form id="meuFormulario">
        <div class="step active" id="step0">
            <h2>Dados para simulação de empréstimo CLT</h2>
            <div class="security-info">
                Buscamos as melhores taxas nos <strong>mais de 20 bancos parceiros</strong>. 
                Seus dados estão protegidos pela <strong>LGPD</strong> e são usados apenas para esta consulta.
            </div>
            <button type="button" onclick="nextStep()">Começar Simulação</button>
        </div>

        <div class="step" id="step1">
            <label>Qual seu nome completo?</label>
            <input type="text" name="nome" id="input_nome" placeholder="Digite seu nome" required>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step2">
            <label>Informe seu CPF</label>
            <input type="tel" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step3">
            <label>Seu telefone WhatsApp</label>
            <input type="tel" name="whatsapp" id="whatsapp" class="sp_celulares" placeholder="00 9 - 0000-0000" maxlength="16" required>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step4">
            <label>Um telefone para receber SMS</label>
            <input type="tel" name="sms" id="sms" class="sp_celulares" placeholder="00 9 - 0000-0000" maxlength="16" required>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step5">
            <label>Tempo de Empresa</label>
            <div class="tempo-container">
                <input type="tel" id="anos" placeholder="Anos" inputmode="numeric" required>
                <input type="tel" id="meses" placeholder="Meses" inputmode="numeric" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step6">
            <label>Data de Nascimento</label>
            <input type="date" name="nascimento" required>
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="button" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="step7">
            <label>Para finalizar, seu melhor e-mail</label>
            <input type="email" name="email" placeholder="email@exemplo.com" required>
            <input type="hidden" name="tempo_final" id="tempo_final">
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="prevStep()">Voltar</button>
                <button type="submit" id="btnEnviar">Concluir Simulação</button>
            </div>
        </div>
    </form>
    <p id="mensagem" style="display:none; text-align:center; color:#00c853; font-weight:bold; margin-top:20px;">✅ Enviado com sucesso! Entraremos em contato.</p>
</div>

<script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step");
    const progressFill = document.getElementById("progressFill");

    function updateProgress() {
        const percent = (currentStep / (steps.length - 1)) * 100;
        progressFill.style.width = percent + "%";
    }

    function nextStep() {
        const currentInputs = steps[currentStep].querySelectorAll("input");
        let valid = true;
        currentInputs.forEach(input => { if(!input.checkValidity()) valid = false; });

        if(valid && currentStep < steps.length - 1) {
            steps[currentStep].classList.remove("active");
            currentStep++;
            steps[currentStep].classList.add("active");
            updateProgress();
        } else if (!valid) {
            alert("Por favor, preencha o campo corretamente.");
        }
    }

    function prevStep() {
        if(currentStep > 0) {
            steps[currentStep].classList.remove("active");
            currentStep--;
            steps[currentStep].classList.add("active");
            updateProgress();
        }
    }

    // Máscaras (Mesma lógica anterior)
    document.querySelectorAll('.sp_celulares').forEach(input => {
        input.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,1})(\d{0,4})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : x[1] + ' ' + x[2] + (x[3] ? ' - ' + x[3] + (x[4] ? '-' + x[4] : '') : '');
        });
    });
    document.getElementById('cpf').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + '.' + x[3] + (x[4] ? '-' + x[4] : '');
    });

    // Envio
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw-fV-DubghPYNXSJsvfqgFlRIKFkC01leKGL2-uQIGtK5CucnD8oqw56FZ72RXVBGm/exec';
    const form = document.getElementById('meuFormulario');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const anos = document.getElementById('anos').value || '0';
        const meses = document.getElementById('meses').value || '0';
        document.getElementById('tempo_final').value = anos + "A " + meses + "M";

        const formData = new FormData(form);
        formData.set('cpf', formData.get('cpf').replace(/\D/g, ''));
        formData.set('whatsapp', formData.get('whatsapp').replace(/\D/g, ''));
        formData.set('sms', formData.get('sms').replace(/\D/g, ''));

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                steps[currentStep].classList.remove("active");
                document.getElementById('mensagem').style.display = "block";
            })
            .catch(error => {
                alert('Erro ao enviar.');
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
