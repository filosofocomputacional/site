<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTEu6XYfBX6dLECkxfarfPyb2WfE9KQSWr1B8WeCshx2w&s">
    <title>Carômetro Firmo de Mattos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="hidden flex flex-col items-center justify-center min-h-screen p-4 bg-slate-900">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-100">
            <div class="flex justify-center mb-6">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTEu6XYfBX6dLECkxfarfPyb2WfE9KQSWr1B8WeCshx2w&s" class="h-20 w-20 rounded-full border-2 border-blue-900 shadow" alt="Logo">
            </div>
            <h2 class="text-2xl font-bold text-center text-blue-900 mb-2">Acesso ao Carômetro</h2>
            <p class="text-sm text-center text-gray-500 mb-6">Insira os dados da escola para prosseguir</p>
            
            <form id="form-login" onsubmit="efetuarLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Usuário / Escola</label>
                    <input type="text" id="login-username" name="username" value="E.E FIRMO DE MATOS" readonly autocomplete="username"
                        class="w-full p-3 border border-gray-300 bg-gray-100 rounded-lg font-semibold text-gray-700 cursor-not-allowed focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Senha de Acesso</label>
                    <input type="password" id="login-password" name="password" placeholder="Digite a senha" required autocomplete="current-password"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                    Entrar <i class="fa-solid fa-right-to-bracket ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- TELA DE SELEÇÃO -->
    <div id="tela-selecao" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-blue-900">Configuração</h2>
                <button onclick="efetuarLogout()" class="text-xs font-semibold text-red-600 hover:text-red-800 transition">
                    <i class="fa-solid fa-power-off"></i> Sair
                </button>
            </div>
            
            <!-- ETAPA DE ENSINO -->
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">1º Passo: Escolha a Etapa de Ensino</label>
                <select id="select-etapa" onchange="filtrarTurmasPorEtapa()" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    <option value="">-- Selecione a Etapa --</option>
                    <option value="1 REG">1º Ano Regular (1 REG)</option>
                    <option value="1 ADM">1º Ano Administração (TEC ADM)</option>
                    <option value="2 REG">2º Ano Regular (2 REG)</option>
                    <option value="3 REG">3º Ano Regular (3 REG)</option>
                </select>
            </div>

            <!-- TURMA -->
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2">2º Passo: Escolha a Turma</label>
                <select id="select-turmas" disabled class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium cursor-not-allowed">
                    <option value="">Selecione uma etapa primeiro...</option>
                </select>
            </div>

            <button onclick="entrarNaTurma()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                Acessar Carômetro
            </button>
        </div>
    </div>

    <!-- TELA DO CARÔMETRO -->
    <div id="tela-carometro" class="hidden">
        <header class="bg-blue-900 text-white p-6 shadow-md">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 id="titulo-turma" class="text-2xl font-bold">Carômetro</h1>
                    <p class="text-sm text-blue-200">Gerencie as fotos dos alunos</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="voltarParaSelecao()" class="bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded shadow transition font-semibold text-sm">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
                    </button>
                    <button onclick="efetuarLogout()" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded shadow transition font-semibold text-sm" title="Desconectar do Carômetro">
                        <i class="fa-solid fa-power-off"></i> Sair
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-center">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-total" class="text-3xl font-bold text-blue-900">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Total de Alunos</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-com-foto" class="text-3xl font-bold text-green-600">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Com Foto</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-sem-foto" class="text-3xl font-bold text-amber-500">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Sem Foto</p>
                </div>
            </div>

            <div id="grid-alunos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            </div>
        </main>
    </div>

    <input type="file" id="input-camera" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="input-galeria" accept="image/*" class="hidden">

    <!-- MODAL DE EDIÇÃO -->
    <div id="modal-edicao" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold text-gray-900 mb-4">Editar Aluno</h3>
            <input type="hidden" id="edit-aluno-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Nome do Aluno</label>
                    <input type="text" id="edit-nome" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Nome da Turma</label>
                    <input type="text" id="edit-turma" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="fecharModal()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition">Cancelar</button>
                <button onclick="salvarEdicaoAluno()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <!-- ================= CONEXÃO E LÓGICA DO SUPABASE ================= -->
    <script>
        const SUPABASE_URL = "https://vydnefdeqljazqaisslq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5ZG5lZmRlcWxqYXpxYWlzc2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTkwNDEsImV4cCI6MjA5ODM5NTA0MX0.tnt7XMk3lpHU00lWQH-0wg-9fCjKEc4MiMVgZZWlY2U";
         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let todasAsTurmas = []; // Armazenará todas as turmas únicas do banco
        let alunoSelecionadoParaUpload = null;

        // Controle de Sessão de Login (24 Horas)
        const CHAVE_EXPIRACAO = "carometro_sessao_expiracao";

        document.addEventListener("DOMContentLoaded", async () => {
            verificarSessao();
            configurarInputsDeArquivo();
        });

        // Verifica se o usuário está logado e se a sessão ainda está válida
        function verificarSessao() {
            const expiracao = localStorage.getItem(CHAVE_EXPIRACAO);
            const agora = Date.now();

            if (expiracao && agora < parseInt(expiracao)) {
                // Logado e válido -> Mostra seleção de turmas
                document.getElementById("tela-login").classList.add("hidden");
                document.getElementById("tela-selecao").classList.remove("hidden");
                document.getElementById("tela-carometro").classList.add("hidden");
                carregarTurmas();
            } else {
                // Não logado ou expirado -> Limpa registros e força login
                localStorage.removeItem(CHAVE_EXPIRACAO);
                document.getElementById("tela-login").classList.remove("hidden");
                document.getElementById("tela-selecao").classList.add("hidden");
                document.getElementById("tela-carometro").classList.add("hidden");
            }
        }

        function efetuarefetuarLogin(event) {
            efetuarLogin(event);
        }

        function efetuarLogin(event) {
            event.preventDefault();
            const senhaDigitada = document.getElementById("login-password").value;

            if (senhaDigitada === "8737") {
                // Guarda timestamp de expiração para exatamente daqui a 24 horas
                const tempoExpiracao = Date.now() + (24 * 60 * 60 * 1000); 
                localStorage.setItem(CHAVE_EXPIRACAO, tempoExpiracao.toString());
                
                document.getElementById("login-password").value = "";
                verificarSessao();
            } else {
                alert("Senha inválida! Tente novamente.");
                document.getElementById("login-password").focus();
            }
        }

        // Encerra a sessão imediatamente
        function efetuarLogout() {
            if (confirm("Tem certeza que deseja sair do sistema?")) {
                localStorage.removeItem(CHAVE_EXPIRACAO);
                verificarSessao();
            }
        }

        // Busca as turmas únicas diretamente da tabela 'carometro' do Supabase
        async function carregarTurmas() {
            const { data, error } = await supabaseClient.from('carometro').select('class_name');
            if (error) return alert("Erro ao carregar turmas do servidor: " + error.message);
            
            // Filtra e ordena nomes únicos de turmas
            todasAsTurmas = [...new Set(data.map(item => item.class_name))].filter(Boolean).sort();
            
            // Reseta os campos de seleção
            document.getElementById("select-etapa").value = "";
            const selectTurmas = document.getElementById("select-turmas");
            selectTurmas.innerHTML = '<option value="">Selecione uma etapa primeiro...</option>';
            selectTurmas.disabled = true;
            selectTurmas.classList.add("bg-gray-50", "cursor-not-allowed");
        }

        // Filtra a lista de turmas com base na etapa de ensino escolhida (CORRIGIDO)
        function filtrarTurmasPorEtapa() {
            const etapaSelecionada = document.getElementById("select-etapa").value;
            const selectTurmas = document.getElementById("select-turmas");

            if (!etapaSelecionada) {
                selectTurmas.innerHTML = '<option value="">Selecione uma etapa primeiro...</option>';
                selectTurmas.disabled = true;
                selectTurmas.classList.add("bg-gray-50", "cursor-not-allowed");
                return;
            }

            let turmasFiltradas = [];

            if (etapaSelecionada === "1 REG") {
                // Filtra turmas que começam com "1 REG" (ex: 1 REG 1, 1 REG 2, etc.)
                turmasFiltradas = todasAsTurmas.filter(nomeTurma => 
                    nomeTurma.toUpperCase().startsWith("1 REG")
                );
            } else if (etapaSelecionada === "1 ADM") {
                // Filtra turmas que contêm "ADM" (ex: ADM 2, ADM 3)
                turmasFiltradas = todasAsTurmas.filter(nomeTurma => {
                    const nomeUpper = nomeTurma.toUpperCase();
                    return nomeUpper.includes("ADM");
                });
            } else if (etapaSelecionada === "2 REG") {
                // Filtra turmas que começam com "2 REG" (ex: 2 REG 1, 2 REG 2, etc.)
                turmasFiltradas = todasAsTurmas.filter(nomeTurma => 
                    nomeTurma.toUpperCase().startsWith("2 REG")
                );
            } else if (etapaSelecionada === "3 REG") {
                // Filtra turmas que começam com "3 REG" (ex: 3 REG 1, 3 REG 2, etc.)
                turmasFiltradas = todasAsTurmas.filter(nomeTurma => 
                    nomeTurma.toUpperCase().startsWith("3 REG")
                );
            }

            // Popula o select de turmas filtradas
            selectTurmas.innerHTML = '<option value="">-- Escolha uma Turma --</option>';
            
            if (turmasFiltradas.length === 0) {
                selectTurmas.innerHTML = '<option value="">Nenhuma turma encontrada nesta etapa</option>';
            } else {
                turmasFiltradas.forEach(turma => {
                    selectTurmas.innerHTML += `<option value="${turma}">${turma}</option>`;
                });
            }

            // Habilita o campo de seleção
            selectTurmas.disabled = false;
            selectTurmas.classList.remove("bg-gray-50", "cursor-not-allowed");
        }

        // Avançar para a tela do Carômetro
        function entrarNaTurma() {
            const nomeTurma = document.getElementById("select-turmas").value;
            if (!nomeTurma) return alert("Selecione uma turma para prosseguir!");
            
            document.getElementById("titulo-turma").innerText = `Carômetro - ${nomeTurma}`;
            
            document.getElementById("tela-selecao").classList.add("hidden");
            document.getElementById("tela-carometro").classList.remove("hidden");
            
            carregarAlunos(nomeTurma);
        }

        function voltarParaSelecao() {
            document.getElementById("tela-carometro").classList.add("hidden");
            document.getElementById("tela-selecao").classList.remove("hidden");
            carregarTurmas(); // Recarrega do banco para detectar edições feitas nos nomes de turmas
        }

        // Buscar Alunos baseados no 'class_name'
        async function carregarAlunos(nomeTurma) {
            const { data: alunos, error } = await supabaseClient
                .from('carometro')
                .select('*')
                .eq('class_name', nomeTurma)
                .order('student_name');

            if (error) return alert("Erro ao carregar alunos: " + error.message);

            // Calcular Métricas Gerais
            const total = alunos.length;
            const comFoto = alunos.filter(a => a.photo_url).length;
            const semFoto = total - comFoto;

            document.getElementById("meta-total").innerText = total;
            document.getElementById("meta-com-foto").innerText = comFoto;
            document.getElementById("meta-sem-foto").innerText = semFoto;

            // Renderizar Grid de Cards
            const grid = document.getElementById("grid-alunos");
            grid.innerHTML = "";

            alunos.forEach(aluno => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col items-center justify-between text-center min-h-[280px]";
                
                // Exibição da foto ou ícone padrão
                let areaFoto = `
                    <div class="w-24 h-24 rounded-full bg-slate-200 flex items-center justify-center border-2 border-gray-300 overflow-hidden mb-3">
                        <i class="fa-solid fa-user text-4xl text-gray-400"></i>
                    </div>`;
                
                if (aluno.photo_url) {
                    areaFoto = `
                        <div class="w-24 h-24 rounded-full border-2 border-blue-500 overflow-hidden mb-3">
                            <img src="${aluno.photo_url}" class="w-full h-full object-cover">
                        </div>`;
                }

                // Botões de ação baseados na presença da foto
                let botoesAcao = "";
                if (aluno.photo_url) {
                    botoesAcao = `
                        <button onclick="window.open('${aluno.photo_url}', '_blank')" class="w-8 h-8 rounded-full bg-green-600 hover:bg-green-700 text-white text-xs shadow" title="Ver foto"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button onclick="removerFoto('${aluno.id}')" class="w-8 h-8 rounded-full bg-red-500 hover:bg-red-600 text-white text-xs shadow" title="Excluir foto"><i class="fa-solid fa-trash"></i></button>
                    `;
                } else {
                    botoesAcao = `
                        <button onclick="dispararUpload('${aluno.id}', 'camera')" class="w-8 h-8 rounded-full bg-purple-600 hover:bg-purple-700 text-white text-xs shadow" title="Tirar Foto"><i class="fa-solid fa-camera"></i></button>
                        <button onclick="dispararUpload('${aluno.id}', 'galeria')" class="w-8 h-8 rounded-full bg-blue-500 hover:bg-blue-600 text-white text-xs shadow" title="Escolher da Galeria"><i class="fa-solid fa-image"></i></button>
                    `;
                }

                card.innerHTML = `
                    <div class="flex flex-col items-center w-full">
                        ${areaFoto}
                        <h4 class="font-bold text-sm text-blue-950 uppercase tracking-tight line-clamp-2 px-1 mb-1">${aluno.student_name}</h4>
                    </div>
                    <div class="flex items-center justify-center gap-2 mt-4 w-full">
                        ${botoesAcao}
                        <button onclick="abrirModalEdicao('${aluno.id}', '${aluno.student_name}', '${aluno.class_name}')" class="w-8 h-8 rounded-full bg-cyan-500 hover:bg-cyan-600 text-white text-xs shadow" title="Editar dados"><i class="fa-solid fa-pen"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- MANIPULAÇÃO DE UPLOAD ---
        function dispararUpload(alunoId, origem) {
            alunoSelecionadoParaUpload = alunoId;
            if (origem === 'camera') document.getElementById("input-camera").click();
            if (origem === 'galeria') document.getElementById("input-galeria").click();
        }

        function configurarInputsDeArquivo() {
            const processarArquivo = async (evento) => {
                const file = evento.target.files[0];
                if (!file || !alunoSelecionadoParaUpload) return;

                console.log("Compactando imagem...");

                new Compressor(file, {
                    quality: 0.6,      
                    maxWidth: 800,     
                    maxHeight: 800,    
                    convertSize: 1000000, 

                    success: async (resultadoCompactado) => {
                        const fileExt = resultadoCompactado.name ? resultadoCompactado.name.split('.').pop() : 'jpg';
                        const caminhoArquivo = `public/${alunoSelecionadoParaUpload}-${Date.now()}.${fileExt}`;

                        const { data, error: storageError } = await supabaseClient.storage
                            .from('fotos-alunos')
                            .upload(caminhoArquivo, resultadoCompactado);

                        if (storageError) return alert("Erro no upload do storage: " + storageError.message);

                        const { data: { publicUrl } } = supabaseClient.storage.from('fotos-alunos').getPublicUrl(caminhoArquivo);

                        const { error: dbError } = await supabaseClient
                            .from('carometro')
                            .update({ photo_url: publicUrl })
                            .eq('id', alunoSelecionadoParaUpload);

                        if (dbError) return alert("Erro ao vincular imagem: " + dbError.message);

                        evento.target.value = "";
                        const turmaAtual = document.getElementById("select-turmas").value;
                        carregarAlunos(turmaAtual);
                    },
                    error(err) {
                        alert("Erro ao compactar a imagem: " + err.message);
                    },
                });
            };

            document.getElementById("input-camera").addEventListener("change", processarArquivo);
            document.getElementById("input-galeria").addEventListener("change", processarArquivo);
        }

        // Remover foto (No banco e no storage)
        async function removerFoto(alunoId) {
            if (!confirm("Tem certeza que deseja remover a foto deste aluno?")) return;

            const { data: aluno, error: fetchError } = await supabaseClient
                .from('carometro')
                .select('photo_url')
                .eq('id', alunoId)
                .single();

            if (fetchError) return alert("Erro ao buscar dados do aluno: " + fetchError.message);

            if (aluno && aluno.photo_url) {
                try {
                    const caminhoArquivo = aluno.photo_url.split('/fotos-alunos/')[1];

                    if (caminhoArquivo) {
                        const { error: storageError } = await supabaseClient.storage
                            .from('fotos-alunos')
                            .remove([caminhoArquivo]);

                        if (storageError) {
                            console.error("Aviso: Não foi possível deletar o arquivo do Storage:", storageError.message);
                        }
                    }
                } catch (err) {
                    console.error("Erro ao processar o caminho do arquivo para exclusão:", err);
                }
            }

            const { error: dbError } = await supabaseClient
                .from('carometro')
                .update({ photo_url: null })
                .eq('id', alunoId);

            if (dbError) return alert("Erro ao remover o vínculo da foto no banco de dados: " + dbError.message);

            const turmaAtual = document.getElementById("select-turmas").value;
            carregarAlunos(turmaAtual);
        }

        // --- MODAL DE EDIÇÃO ---
        function abrirModalEdicao(id, nome, turma) {
            document.getElementById("edit-aluno-id").value = id;
            document.getElementById("edit-nome").value = nome;
            document.getElementById("edit-turma").value = turma;
            document.getElementById("modal-edicao").classList.remove("hidden");
        }

        function fecharModal() {
            document.getElementById("modal-edicao").classList.add("hidden");
        }

        async function salvarEdicaoAluno() {
            const id = document.getElementById("edit-aluno-id").value;
            const novoNome = document.getElementById("edit-nome").value;
            const novaTurma = document.getElementById("edit-turma").value;

            if (!novoNome.trim() || !novaTurma.trim()) {
                return alert("Nome e Turma não podem ficar vazios!");
            }

            const { error } = await supabaseClient.from('carometro')
                .update({ student_name: novoNome, class_name: novaTurma })
                .eq('id', id);

            if (error) return alert("Erro ao atualizar dados: " + error.message);

            fecharModal();
            
            const turmaAtual = document.getElementById("select-turmas").value;
            carregarAlunos(turmaAtual);
        }
    </script>
</body>
</html>
